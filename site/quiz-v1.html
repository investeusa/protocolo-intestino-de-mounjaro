<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teste do Intestino de Mounjaro | Avaliação Bristol</title>
    <style>
  :root{
    --bg:#F4F8F6;
    --card:#FFFFFF;
    --ink:#16302B;
    --ink-soft:#4E6660;
    --teal:#0E6B5C;
    --teal-deep:#0A4A40;
    --cta:#F26B3A;
    --cta-deep:#D9541F;
    --amber:#FFB930;
    --danger:#C9402E;
    --line:#DCE8E3;
    --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--bg);
  }
  /* ---------- header ---------- */
  .topbar{
    padding:14px 20px 10px;
    text-align:center;
  }
  .brand{
    font-size:13px;
    font-weight:800;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--teal-deep);
  }
  .brand span{color:var(--cta);}
  .progress-wrap{
    padding:0 20px 6px;
  }
  .progress-track{
    height:6px;
    background:var(--line);
    border-radius:99px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:4%;
    background:linear-gradient(90deg,var(--teal),#1AA88F);
    border-radius:99px;
    transition:width .45s cubic-bezier(.4,0,.2,1);
  }
  .progress-label{
    font-size:11px;
    color:var(--ink-soft);
    text-align:right;
    margin-top:5px;
    font-weight:600;
  }
  /* ---------- screens ---------- */
  .stage{flex:1;position:relative;overflow:hidden;}
  .screen{
    position:absolute;
    inset:0;
    padding:18px 20px 32px;
    overflow-y:auto;
    opacity:0;
    transform:translateX(28px);
    pointer-events:none;
    transition:opacity .35s ease,transform .35s ease;
    display:flex;
    flex-direction:column;
  }
  .screen.active{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
  }
  .eyebrow{
    font-size:11px;
    font-weight:800;
    letter-spacing:1.8px;
    text-transform:uppercase;
    color:var(--teal);
    margin-bottom:10px;
  }
  h1{
    font-size:24px;
    line-height:1.25;
    font-weight:800;
    letter-spacing:-.3px;
    margin-bottom:10px;
  }
  h2{
    font-size:21px;
    line-height:1.3;
    font-weight:800;
    letter-spacing:-.2px;
    margin-bottom:8px;
  }
  .sub{
    font-size:15px;
    line-height:1.55;
    color:var(--ink-soft);
    margin-bottom:18px;
  }
  .sub b{color:var(--ink);}
  mark{
    background:linear-gradient(transparent 55%, #FFE3A6 55%);
    color:inherit;
    padding:0 2px;
  }
  /* ---------- options ---------- */
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:var(--radius);
    padding:15px 16px;
    font-size:15.5px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    text-align:left;
    transition:border-color .15s,transform .12s,background .15s;
  }
  .opt:active{transform:scale(.98);}
  .opt.selected{
    border-color:var(--teal);
    background:#EAF5F1;
  }
  .opt .emoji{font-size:22px;flex-shrink:0;}
  .opt small{display:block;font-weight:500;color:var(--ink-soft);font-size:12.5px;margin-top:2px;}
  /* ---------- bristol cards ---------- */
  .bristol-note{
    display:flex;
    align-items:center;
    gap:10px;
    background:#EAF5F1;
    border:1px solid #CBE4DB;
    border-radius:12px;
    padding:10px 12px;
    margin-bottom:14px;
  }
  .bristol-note svg{flex-shrink:0;}
  .bristol-note p{font-size:12.5px;line-height:1.45;color:var(--teal-deep);font-weight:600;}
  .bristol-grid{display:flex;flex-direction:column;gap:10px;}
  .bcard{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:var(--radius);
    padding:12px 14px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    transition:border-color .15s,transform .12s,background .15s;
  }
  .bcard:active{transform:scale(.98);}
  .bcard.selected{border-color:var(--teal);background:#EAF5F1;}
  .bcard .pic{
    width:74px;
    height:46px;
    flex-shrink:0;
    background:#F7F3EC;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .bcard .txt b{font-size:14.5px;display:block;}
  .bcard .txt span{font-size:12.5px;color:var(--ink-soft);line-height:1.4;display:block;margin-top:2px;}
  .btag{
    font-size:10px;
    font-weight:800;
    letter-spacing:.8px;
    text-transform:uppercase;
    border-radius:6px;
    padding:2px 7px;
    display:inline-block;
    margin-top:5px;
  }
  .btag.hard{background:#FBE3DE;color:var(--danger);}
  .btag.ok{background:#DFF2E8;color:#177A4C;}
  .btag.loose{background:#FFF1D6;color:#9A6A00;}
  /* ---------- info pages ---------- */
  .info-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 18px;
    margin-bottom:14px;
  }
  .stat-hero{
    text-align:center;
    padding:22px 16px;
    background:linear-gradient(160deg,#0E6B5C,#0A4A40);
    color:#fff;
    border-radius:var(--radius);
    margin-bottom:14px;
  }
  .stat-hero .big{
    font-size:52px;
    font-weight:800;
    letter-spacing:-1px;
    line-height:1;
  }
  .stat-hero .big small{font-size:22px;font-weight:700;}
  .stat-hero p{font-size:14px;margin-top:8px;opacity:.92;line-height:1.5;}
  .src{
    font-size:11px;
    color:var(--ink-soft);
    text-align:center;
    margin-top:10px;
  }
  .mech{
    display:flex;
    flex-direction:column;
    gap:0;
  }
  .mech-step{
    display:flex;
    gap:14px;
    align-items:flex-start;
  }
  .mech-rail{
    display:flex;
    flex-direction:column;
    align-items:center;
    flex-shrink:0;
  }
  .mech-dot{
    width:34px;height:34px;
    border-radius:50%;
    background:#EAF5F1;
    border:2px solid var(--teal);
    color:var(--teal-deep);
    font-weight:800;
    font-size:14px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .mech-line{width:2px;flex:1;min-height:26px;background:var(--line);}
  .mech-step .mtxt{padding-bottom:18px;}
  .mech-step .mtxt b{font-size:14.5px;display:block;margin-bottom:2px;}
  .mech-step .mtxt span{font-size:13.5px;color:var(--ink-soft);line-height:1.5;}
  .warn-box{
    background:#FDF0EC;
    border:1px solid #F3CFC5;
    border-radius:var(--radius);
    padding:16px;
    margin-top:4px;
  }
  .warn-box b{color:var(--danger);font-size:14.5px;}
  .warn-box p{font-size:13.5px;color:#6B4038;line-height:1.55;margin-top:5px;}
  /* ---------- buttons ---------- */
  .btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:17px;
    font-size:16.5px;
    font-weight:800;
    letter-spacing:.2px;
    cursor:pointer;
    color:#fff;
    background:linear-gradient(180deg,var(--cta),var(--cta-deep));
    box-shadow:0 6px 18px rgba(242,107,58,.35);
    transition:transform .12s;
    margin-top:auto;
  }
  .btn:active{transform:scale(.98);}
  .btn.teal{
    background:linear-gradient(180deg,#128268,var(--teal-deep));
    box-shadow:0 6px 18px rgba(14,107,92,.3);
  }
  .btn-spacer{margin-top:18px;}
  /* ---------- testimonial ---------- */
  .testi{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-top:14px;
  }
  .testi .who{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .avatar{
    width:40px;height:40px;border-radius:50%;
    background:linear-gradient(135deg,#FFB930,#F26B3A);
    color:#fff;font-weight:800;font-size:15px;
    display:flex;align-items:center;justify-content:center;
  }
  .testi .who b{font-size:14px;display:block;}
  .stars{color:#FFB930;font-size:12px;letter-spacing:1px;}
  .testi p{font-size:13.5px;line-height:1.55;color:var(--ink-soft);font-style:italic;}
  /* ---------- loading ---------- */
  .load-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:22px;
  }
  .ring{
    width:110px;height:110px;
    position:relative;
  }
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:800;color:var(--teal-deep);
  }
  .load-msg{
    font-size:15px;
    font-weight:600;
    color:var(--ink);
    min-height:44px;
    line-height:1.5;
  }
  .load-check{
    font-size:13px;
    color:var(--ink-soft);
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:flex-start;
  }
  .load-check div{display:flex;gap:8px;align-items:center;opacity:.25;transition:opacity .4s;}
  .load-check div.done{opacity:1;}
  .load-check .tick{color:var(--teal);font-weight:800;}
  /* ---------- result ---------- */
  .result-badge{
    text-align:center;
    margin-bottom:14px;
  }
  .result-badge .tag{
    display:inline-block;
    background:#FBE3DE;
    color:var(--danger);
    font-size:11px;
    font-weight:800;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:99px;
  }
  .gauge-wrap{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 16px 16px;
    text-align:center;
    margin-bottom:14px;
  }
  .gauge-bar{
    height:14px;
    border-radius:99px;
    background:linear-gradient(90deg,#2FA97C 0%,#FFB930 50%,#C9402E 100%);
    position:relative;
    margin:18px 6px 6px;
  }
  .gauge-pin{
    position:absolute;
    top:-9px;
    width:4px;height:32px;
    background:var(--ink);
    border-radius:4px;
    transform:translateX(-50%);
    transition:left 1s cubic-bezier(.4,0,.2,1);
  }
  .gauge-pin::after{
    content:"";
    position:absolute;
    top:-7px;left:50%;
    transform:translateX(-50%);
    border:6px solid transparent;
    border-top-color:var(--ink);
  }
  .gauge-scale{
    display:flex;justify-content:space-between;
    font-size:10.5px;color:var(--ink-soft);
    font-weight:700;text-transform:uppercase;letter-spacing:.5px;
    padding:4px 2px 0;
  }
  .diag-list{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
  .diag-row{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-size:13.5px;
  }
  .diag-row span{color:var(--ink-soft);font-weight:600;}
  .diag-row b{text-align:right;}
  .diag-row b.bad{color:var(--danger);}
  .diag-row b.good{color:#177A4C;}
  .proto{
    background:linear-gradient(160deg,#0E6B5C,#0A4A40);
    border-radius:var(--radius);
    padding:22px 18px;
    color:#fff;
    margin-bottom:14px;
  }
  .proto .p-eyebrow{
    font-size:10.5px;font-weight:800;letter-spacing:2px;
    text-transform:uppercase;color:var(--amber);
    margin-bottom:8px;
  }
  .proto h3{font-size:19px;line-height:1.3;margin-bottom:12px;}
  .proto ul{list-style:none;display:flex;flex-direction:column;gap:9px;}
  .proto li{
    font-size:13.5px;line-height:1.5;
    display:flex;gap:9px;align-items:flex-start;
  }
  .proto li .tick{color:var(--amber);font-weight:800;flex-shrink:0;}
  .scarcity{
    text-align:center;
    font-size:12.5px;
    color:var(--danger);
    font-weight:700;
    margin-top:10px;
  }
  .guarantee{
    display:flex;align-items:center;gap:10px;
    justify-content:center;
    margin-top:12px;
    font-size:12px;color:var(--ink-soft);
  }
  .disclaimer{
    font-size:10.5px;
    color:#9AAEA8;
    line-height:1.5;
    text-align:center;
    margin-top:16px;
    padding:0 6px;
  }
  .hero-icon{
    width:76px;height:76px;
    border-radius:22px;
    background:linear-gradient(160deg,#0E6B5C,#0A4A40);
    display:flex;align-items:center;justify-content:center;
    margin:6px auto 18px;
    box-shadow:0 10px 26px rgba(10,74,64,.28);
  }
  .center{text-align:center;}
  .social-count{
    display:flex;align-items:center;justify-content:center;gap:8px;
    font-size:12.5px;color:var(--ink-soft);font-weight:600;
    margin-top:14px;
  }
  .dots{display:flex;}
  .dots i{
    width:24px;height:24px;border-radius:50%;
    border:2px solid var(--bg);
    margin-left:-8px;
    background:linear-gradient(135deg,#B9D8CE,#7FB8A8);
    display:block;
  }
  .dots i:first-child{margin-left:0;}
</style>
  </head>

    <div class="app">
      <div class="topbar">
        <div class="brand">TESTE DO <span>INTESTINO DE MOUNJARO</span></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill"
            id="pfill"></div></div>
        <div class="progress-label" id="plabel">Etapa 1 de 13</div>
      </div>

      <div class="stage" id="stage"></div>
    </div>

    <script>
/* =========================================================
   TESTE DO INTESTINO DE MOUNJARO™ — funil de quiz com Escala de Bristol
   Fluxo: segmentação → aquecimento → dopamina → Bristol →
   mecanismo do problema → emoção → medo → personalização →
   loading → resultado personalizado → CTA para PV
========================================================= */

const answers = {};
let stepIndex = 0;

/* ---------- SVGs da Escala de Bristol (ilustração clínica abstrata) ---------- */
const B = "#8A6244"; /* tom clínico */
const bristolSVG = {

/* ---------- definição das etapas ---------- */
const steps = [

/* 1 — SEGMENTAÇÃO */

/* 2 — TEMPO DE USO */

  render:()=>`

/* 4 — TIRO DE DOPAMINA */
{
  info:true,
  render:()=>`
    <div class="eyebrow">Você não está sozinha</div>

      <div class="big">1 <small>em cada</small> 5</div>

      <p>"Eu já tinha eliminado 9kg com o Mounjaro, mas passava 5 dias sem ir ao banheiro. Achei que era o preço a pagar. Não era. Em 2 semanas de protocolo meu intestino voltou ao normal — sem parar a caneta."</p>

/* 5 — ESCALA DE BRISTOL */
{
  render:()=>`
    <div class="eyebrow">Escala de Bristol</div>
    <h2>Nos últimos 7 dias, qual formato descreve melhor as suas fezes?</h2>
    <div class="bristol-note">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#0E6B5C"/><path d="M12 7v6M12 16.5v.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>

    <div class="bristol-grid">

/* ---------- helpers de template ---------- */
function opt(key,label,emoji,meta){
  return `<button class="opt" onclick="pick(this,'${key}',\`${label}\`)">
    ${emoji?`<span class="emoji">${emoji}</span>`:''}
    <span>${label}</span>
  </button>`;
}
function mopt(label,emoji){
  return `<button class="opt" onclick="togglePick(this,\`${label}\`)">
    <span class="emoji">${emoji}</span><span>${label}</span>
  </button>`;
}
function bristol(n,title,desc,tagCls,tagTxt){
  return `<button class="bcard" onclick="pickBristol(this,${n})">
    <div class="pic">${bristolSVG[n]}</div>
    <div class="txt"><b>${title}</b><span>${desc}</span><span class="btag ${tagCls}">${tagTxt}</span></div>
  </button>`;
}
function mech(n,title,desc,last){
  return `<div class="mech-step">
    <div class="mech-rail"><div class="mech-dot">${n}</div>${last?'':'<div class="mech-line"></div>'}</div>
    <div class="mtxt"><b>${title}</b><span>${desc}</span></div>
  </div>`;
}

/* ---------- navegação ---------- */
const stage=document.getElementById('stage');
const pfill=document.getElementById('pfill');
const plabel=document.getElementById('plabel');

function mount(){
  stage.innerHTML='';
  const s=steps[stepIndex];
  const div=document.createElement('div');
  div.className='screen';
  div.innerHTML=s.render();
  stage.appendChild(div);
  requestAnimationFrame(()=>requestAnimationFrame(()=>div.classList.add('active')));
  const totalVisible=13;
  const shown=Math.min(stepIndex+1,totalVisible);
  pfill.style.width=(shown/totalVisible*100)+'%';
  plabel.textContent=s.result?'Resultado pronto ✓':`Etapa ${shown} de ${totalVisible}`;
  if(s.loading) runLoading();
  if(s.result) setTimeout(placeGauge,300);
  stage.scrollTop=0;
}
function next(){
  if(stepIndex<steps.length-1){stepIndex++;mount();}
}
function pick(el,key,label){
  el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  answers[key]=label;
  setTimeout(next,340);
}
function pickBristol(el,n){
  el.parentElement.querySelectorAll('.bcard').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  answers.bristol=n;
  setTimeout(next,380);
}
let multiSel=[];
function togglePick(el,label){
  el.classList.toggle('selected');
  if(el.classList.contains('selected')) multiSel.push(label);
  else multiSel=multiSel.filter(l=>l!==label);
}
function confirmMulti(){
  answers.sintomas=multiSel.slice();
  multiSel=[];
  next();
}

/* ---------- loading sequence ---------- */
function runLoading(){
  const arc=document.getElementById('ringArc');
  const pct=document.getElementById('ringPct');
  const msg=document.getElementById('loadMsg');
  const checks=[...document.querySelectorAll('#loadChecks div')];
  const msgs=[
    'Analisando suas respostas...',
    'Classificando seu padrão intestinal...',
    'Comparando com dados dos estudos SURMOUNT...',
    'Seu protocolo está quase pronto...'
  ];
  let p=0;
  const t=setInterval(()=>{
    p+=1;
    if(p>100){clearInterval(t);setTimeout(next,500);return;}
    pct.textContent=p+'%';
    arc.style.strokeDashoffset=301.6*(1-p/100);
    const phase=Math.min(3,Math.floor(p/26));
    msg.textContent=msgs[phase];
    checks.forEach((c,i)=>{if(p>=(i+1)*24)c.classList.add('done');});
  },42);
}

/* ---------- lógica de score ---------- */
function computeScore(){
  let score=0;
  const b=answers.bristol||4;
  if(b===1)score+=40; else if(b===2)score+=32; else if(b===3)score+=18; else if(b===4)score+=4; else score+=8;
  const f=answers.freq||'';
  if(f.includes('1 vez'))score+=25; else if(f.includes('2 a 3'))score+=18; else if(f.includes('4 a 6'))score+=8;
  const s=(answers.sintomas||[]).filter(x=>x!=='Nenhum desses').length;
  score+=Math.min(20,s*5);
  if((answers.agua||'').includes('Menos de 1'))score+=8;
  else if((answers.agua||'').includes('Não faço'))score+=5;
  if((answers.fibra||'').includes('muito pouco'))score+=7;
  else if((answers.fibra||'').includes('quase nada'))score+=5;
  return Math.min(97,Math.max(12,score));
}
function severity(score){
  if(score>=65)return{label:'SEVERO',color:'bad',frase:'constipação severa induzida por GLP-1'};
  if(score>=40)return{label:'MODERADO',color:'bad',frase:'constipação moderada induzida por GLP-1'};
  if(score>=22)return{label:'LEVE',color:'bad',frase:'lentificação intestinal em estágio inicial'};
  return{label:'BAIXO',color:'good',frase:'trânsito intestinal preservado (por enquanto)'};
}
