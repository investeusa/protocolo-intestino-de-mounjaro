<!DOCTYPE html>
<html lang="pt-BR">

    <title>Teste do Intestino de Mounjaro | Protocolo Intestino de Mounjaro</title>
    <style>
  :root{
    --bg:#F4F8F6;
    --card:#FFFFFF;
    --ink:#16302B;
    --ink-soft:#4E6660;
    --teal:#0E6B5C;
    --teal-deep:#0A4A40;
    --cta:#F26B3A;
    --cta-deep:#D9541F;
    --amber:#FFB930;
    --danger:#C9402E;
    --green:#1E9E6A;
    --line:#DCE8E3;

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;

    display:flex;

  .app{

    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--bg);

  .progress-label{font-size:11px;color:var(--ink-soft);text-align:right;margin-top:5px;font-weight:600;}

  .stage{flex:1;position:relative;overflow:hidden;}

    position:absolute;inset:0;
    padding:18px 20px 32px;

    opacity:0;transform:translateX(28px);
    pointer-events:none;
    transition:opacity .35s ease,transform .35s ease;
    display:flex;flex-direction:column;
  }
  .screen.active{opacity:1;transform:translateX(0);pointer-events:auto;}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal);margin-bottom:10px;}
  h1{font-size:24px;line-height:1.25;font-weight:800;letter-spacing:-.3px;margin-bottom:10px;}
  h2{font-size:21px;line-height:1.3;font-weight:800;letter-spacing:-.2px;margin-bottom:8px;}
  .sub{font-size:15px;line-height:1.55;color:var(--ink-soft);margin-bottom:18px;}
  .sub b{color:var(--ink);}
  mark{background:linear-gradient(transparent 55%, #FFE3A6 55%);color:inherit;padding:0 2px;}
  /* ---------- options ---------- */
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    background:var(--card);border:2px solid var(--line);border-radius:var(--radius);
    padding:15px 16px;font-size:15px;font-weight:600;color:var(--ink);
    cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left;
    line-height:1.4;
    transition:border-color .15s,transform .12s,background .15s;
  }
  .opt:active{transform:scale(.98);}
  .opt.selected{border-color:var(--teal);background:#EAF5F1;}
  .opt .emoji{font-size:22px;flex-shrink:0;}
  /* escala 0-10 */
  .scale-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .scale-btn{
    background:var(--card);border:2px solid var(--line);border-radius:12px;
    padding:13px 0;font-size:16px;font-weight:800;color:var(--ink);cursor:pointer;
    transition:border-color .15s,background .15s,transform .12s;
  }
  .scale-btn:active{transform:scale(.94);}
  .scale-btn.selected{border-color:var(--teal);background:#EAF5F1;color:var(--teal-deep);}
  .scale-legend{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-soft);font-weight:700;margin-top:8px;}
  /* ---------- bristol ---------- */

    display:flex;align-items:center;gap:10px;
    background:#EAF5F1;border:1px solid #CBE4DB;border-radius:12px;
    padding:10px 12px;margin-bottom:14px;
  }

  .bristol-grid{display:flex;flex-direction:column;gap:10px;}
  .bcard{
    background:var(--card);border:2px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;display:flex;align-items:center;gap:14px;cursor:pointer;
    transition:border-color .15s,transform .12s,background .15s;

  .bcard:active{transform:scale(.98);}
  .bcard.selected{border-color:var(--teal);background:#EAF5F1;}
  .bcard .pic{width:74px;height:46px;flex-shrink:0;background:#F7F3EC;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .bcard .txt b{font-size:14.5px;display:block;}
  .bcard .txt span{font-size:12.5px;color:var(--ink-soft);line-height:1.4;display:block;margin-top:2px;}
  .btag{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;border-radius:6px;padding:2px 7px;display:inline-block;margin-top:5px;}
  .btag.hard{background:#FBE3DE;color:var(--danger);}
  .btag.ok{background:#DFF2E8;color:#177A4C;}
  .btag.loose{background:#FFF1D6;color:#9A6A00;}

    background:linear-gradient(160deg,#0E6B5C,#0A4A40);color:#fff;

  .stat-hero .big small{font-size:20px;font-weight:700;}
  .stat-hero p{font-size:14px;margin-top:8px;opacity:.92;line-height:1.5;}
  .src{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:10px;}
  .testi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:14px;}
  .testi .who{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#FFB930,#F26B3A);color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .testi .who b{font-size:14px;display:block;}
  .stars{color:#FFB930;font-size:12px;letter-spacing:1px;}
  .testi p{font-size:13.5px;line-height:1.55;color:var(--ink-soft);font-style:italic;}
  /* ---------- botões ---------- */
  .btn{
    width:100%;border:none;border-radius:14px;padding:17px;
    font-size:16.5px;font-weight:800;letter-spacing:.2px;cursor:pointer;color:#fff;
    background:linear-gradient(180deg,var(--cta),var(--cta-deep));
    box-shadow:0 6px 18px rgba(242,107,58,.35);
    transition:transform .12s;margin-top:auto;
  }
  .btn:active{transform:scale(.98);}
  .btn.teal{background:linear-gradient(180deg,#128268,var(--teal-deep));box-shadow:0 6px 18px rgba(14,107,92,.3);}
  .btn-spacer{margin-top:18px;}
  /* ---------- loading ---------- */
  .load-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:22px;}
  .ring{width:110px;height:110px;position:relative;}
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--teal-deep);}
  .load-msg{font-size:15px;font-weight:600;color:var(--ink);min-height:44px;line-height:1.5;}
  .load-check{font-size:13px;color:var(--ink-soft);display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
  .load-check div{display:flex;gap:8px;align-items:center;opacity:.25;transition:opacity .4s;}
  .load-check div.done{opacity:1;}
  .load-check .tick{color:var(--teal);font-weight:800;}
  /* ---------- resultado / gráfico ---------- */
  .result-badge{text-align:center;margin-bottom:14px;}
  .result-badge .tag{display:inline-block;background:#DFF2E8;color:#177A4C;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:99px;}
  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 14px 12px;margin-bottom:14px;}
  .chart-card h3{font-size:14px;text-align:center;margin-bottom:4px;}
  .chart-card .ch-sub{font-size:12px;color:var(--ink-soft);text-align:center;margin-bottom:10px;}
  /* ---------- PV ---------- */
  .sticky-cta{
    position:sticky;top:0;z-index:50;
    padding:10px 14px;
    background:rgba(244,248,246,.95);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
    display:none;

  .sticky-cta.show{display:block;}
  .sticky-cta button{
    width:100%;border:none;border-radius:12px;padding:14px;
    font-size:15px;font-weight:800;color:#fff;cursor:pointer;
    background:linear-gradient(180deg,var(--cta),var(--cta-deep));
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(242,107,58,.55);}
    70%{box-shadow:0 0 0 14px rgba(242,107,58,0);}
    100%{box-shadow:0 0 0 0 rgba(242,107,58,0);}
  }
  @media (prefers-reduced-motion: reduce){
    .sticky-cta button{animation:none;}
  }
  .pv-section{margin-bottom:22px;}
  .before-after{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
  .ba-card{border-radius:var(--radius);padding:16px 12px;text-align:center;}
  .ba-card.before{background:#FDF0EC;border:1px solid #F3CFC5;}
  .ba-card.after{background:#DFF2E8;border:1px solid #BCE3D0;}
  .ba-card .ba-label{font-size:10.5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
  .ba-card.before .ba-label{color:var(--danger);}

  .ba-card li{font-size:12px;line-height:1.4;display:flex;gap:6px;align-items:flex-start;}
  .price-box{
    background:var(--card);border:2px solid var(--teal);border-radius:var(--radius);
    padding:20px 16px;text-align:center;

    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);

  .deliv-item .dt .val{font-size:12px;font-weight:800;margin-top:5px;display:block;}
  .deliv-item .dt .val s{color:var(--ink-soft);font-weight:600;}
  .deliv-item .dt .val em{color:#177A4C;font-style:normal;}
  .bonus-tag{display:inline-block;background:#FFF1D6;color:#9A6A00;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:6px;margin-bottom:4px;}
  .total-line{
    background:#0A4A40;color:#fff;border-radius:var(--radius);
    padding:16px;text-align:center;margin-top:10px;
  }
  .total-line .t1{font-size:13px;opacity:.85;}
  .total-line .t1 s{opacity:.9;}
  .total-line .t2{font-size:22px;font-weight:800;margin-top:2px;}
  .benefits{display:flex;flex-direction:column;gap:9px;}
  .benefit{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;font-size:13.5px;line-height:1.5;
    display:flex;gap:10px;align-items:flex-start;
  }
  .benefit .tick{color:var(--green);font-weight:800;flex-shrink:0;font-size:15px;}
  .guarantee-box{
    background:var(--card);border:2px dashed var(--teal);border-radius:var(--radius);
    padding:20px 16px;text-align:center;
  }
  .guarantee-box h3{font-size:17px;margin:10px 0 6px;}
  .guarantee-box p{font-size:13.5px;color:var(--ink-soft);line-height:1.55;}
  .faq{display:flex;flex-direction:column;gap:9px;}
  .faq-item{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .faq-q{
    width:100%;background:none;border:none;text-align:left;cursor:pointer;
    padding:14px;font-size:14px;font-weight:700;color:var(--ink);
    display:flex;justify-content:space-between;gap:10px;align-items:center;
  }
  .faq-q .chev{transition:transform .25s;color:var(--teal);font-weight:800;flex-shrink:0;}
  .faq-item.open .chev{transform:rotate(90deg);}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .faq-a p{padding:0 14px 14px;font-size:13.5px;line-height:1.55;color:var(--ink-soft);}
  .faq-item.open .faq-a{max-height:300px;}
  .pv-h{font-size:19px;font-weight:800;text-align:center;margin-bottom:14px;letter-spacing:-.2px;}
  .disclaimer{font-size:10.5px;color:#9AAEA8;line-height:1.5;text-align:center;margin-top:20px;padding:0 6px 30px;}
  .scarcity{text-align:center;font-size:12.5px;color:var(--danger);font-weight:700;margin-top:10px;}
  .social-count{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:14px;}
  .dots{display:flex;}
  .dots i{width:24px;height:24px;border-radius:50%;border:2px solid var(--bg);margin-left:-8px;background:linear-gradient(135deg,#B9D8CE,#7FB8A8);display:block;}
  .dots i:first-child{margin-left:0;}
  .center{text-align:center;}
</style>

function bristol(n,title,desc,tagCls,tagTxt){

/* ---------- gráfico SVG (hoje → dia 7) ---------- */
function chartSVG(score){
  const W=380,H=190,padL=34,padR=14,padT=16,padB=30;
  const xs=[0,2,5,7];
  const proj=[score,Math.round(score*.65),Math.round(score*.35),Math.min(18,Math.round(score*.12))];
  const x=v=>padL+(v/7)*(W-padL-padR);
  const y=v=>padT+(1-v/100)*(H-padT-padB);
  const pts=xs.map((d,i)=>`${x(d)},${y(proj[i])}`).join(' ');
  const area=`${x(0)},${y(proj[0])} ${pts} ${x(7)},${H-padB} ${x(0)},${H-padB}`;
  return `
  <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    <defs>
      <linearGradient id="gArea" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#F26B3A" stop-opacity=".28"/>
        <stop offset="100%" stop-color="#1E9E6A" stop-opacity=".08"/>
      </linearGradient>
    </defs>
    <!-- zona regulada -->
    <rect x="${padL}" y="${y(25)}" width="${W-padL-padR}" height="${(H-padB)-y(25)}" fill="#DFF2E8" opacity=".7"/>
    <text x="${W-padR-4}" y="${y(25)+16}" font-size="10" fill="#177A4C" font-weight="700" text-anchor="end">ZONA REGULADA</text>
    <!-- grid -->
    ${[0,25,50,75,100].map(v=>`
      <line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="#DCE8E3" stroke-width="1"/>
      <text x="${padL-6}" y="${y(v)+3.5}" font-size="9.5" fill="#4E6660" text-anchor="end">${v}</text>`).join('')}
    <!-- área + linha -->
    <polygon points="${area}" fill="url(#gArea)"/>
    <polyline points="${pts}" fill="none" stroke="#0E6B5C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- pontos -->
    ${xs.map((d,i)=>`
      <circle cx="${x(d)}" cy="${y(proj[i])}" r="6" fill="${i===0?'#C9402E':(i===3?'#1E9E6A':'#0E6B5C')}" stroke="#fff" stroke-width="2.5"/>
    `).join('')}
    <!-- labels pontos -->
    <text x="${x(0)}" y="${y(proj[0])-12}" font-size="11" font-weight="800" fill="#C9402E" text-anchor="start">HOJE: ${proj[0]}</text>
    <text x="${x(7)}" y="${y(proj[3])-12}" font-size="11" font-weight="800" fill="#1E9E6A" text-anchor="end">DIA 7: ${proj[3]}</text>
    <!-- eixo x -->
    ${xs.map(d=>`<text x="${x(d)}" y="${H-10}" font-size="10" fill="#4E6660" text-anchor="middle" font-weight="600">${d===0?'Hoje':'Dia '+d}</text>`).join('')}
  </svg>`;
}

/* ---------- navegação ---------- */
const stage=document.getElementById('stage');
const pfill=document.getElementById('pfill');
const plabel=document.getElementById('plabel');
const stickyCta=document.getElementById('stickyCta');
const progressWrap=document.getElementById('progressWrap');

function mount(){
  stage.innerHTML='';
  const s=steps[stepIndex];
  const div=document.createElement('div');
  div.className='screen';
  div.innerHTML=s.render();
  stage.appendChild(div);
  requestAnimationFrame(()=>requestAnimationFrame(()=>div.classList.add('active')));
  const totalVisible=19;
  const shown=Math.min(stepIndex+1,totalVisible);
  pfill.style.width=(shown/totalVisible*100)+'%';
  plabel.textContent=s.pv?'Oferta liberada ✓':`Etapa ${shown} de ${totalVisible}`;
  stickyCta.classList.toggle('show',!!s.pv);
  progressWrap.style.display=s.pv?'none':'block';
  if(s.loading)runLoading();
  stage.scrollTop=0;
}
function next(){if(stepIndex<steps.length-1){stepIndex++;mount();}}
function pick(el,key,label){
  el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  answers[key]=label;
  setTimeout(next,340);
}
function pickBristol(el,n){
  el.parentElement.querySelectorAll('.bcard').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  answers.bristol=n;
  setTimeout(next,380);
}
function pickScale(el,n){
  el.parentElement.querySelectorAll('.scale-btn').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  answers.leveza=n;
  setTimeout(next,340);
}

/* ---------- loading ---------- */
function runLoading(){
  const arc=document.getElementById('ringArc');
  const pct=document.getElementById('ringPct');
  const msg=document.getElementById('loadMsg');
  const checks=[...document.querySelectorAll('#loadChecks div')];
  const msgs=[
    'Analisando suas respostas...',
    'Classificando seu padrão intestinal...',
    'Comparando com dados dos estudos SURMOUNT...',
    'Seu Protocolo Intestino de Mounjaro está quase pronto...'
  ];
  let p=0;
  const t=setInterval(()=>{
    p+=1;
    if(p>100){clearInterval(t);setTimeout(next,500);return;}
    pct.textContent=p+'%';
    arc.style.strokeDashoffset=301.6*(1-p/100);
    msg.textContent=msgs[Math.min(3,Math.floor(p/26))];
    checks.forEach((c,i)=>{if(p>=(i+1)*24)c.classList.add('done');});
  },42);
}

/* ---------- score ---------- */
function computeScore(){
  let score=0;
  const b=answers.bristol||4;
  if(b===1)score+=40;else if(b===2)score+=32;else if(b===3)score+=18;else if(b===4)score+=4;else score+=8;
  const f=answers.freq||'';
  if(f.includes('1 vez'))score+=25;else if(f.includes('2 a 3'))score+=18;else if(f.includes('4 a 6'))score+=8;
  const lev=answers.leveza!==undefined?answers.leveza:5;
  score+=Math.round((10-lev)*1.6);
  if((answers.agua||'').includes('Menos de 1'))score+=8;
  else if((answers.agua||'').includes('Não faço'))score+=5;
  if((answers.fibra||'').includes('muito pouco'))score+=7;
  else if((answers.fibra||'').includes('quase nada'))score+=5;
  return Math.min(97,Math.max(15,score));
}
function severity(score){
  if(score>=65)return{label:'SEVERO',frase:'constipação severa induzida por GLP-1'};
  if(score>=40)return{label:'MODERADO',frase:'constipação moderada induzida por GLP-1'};
  if(score>=22)return{label:'LEVE',frase:'lentificação intestinal em estágio inicial'};
  return{label:'BAIXO',frase:'trânsito intestinal preservado (por enquanto)'};
}
